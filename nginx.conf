# ── Al-Hasade Production Nginx Configuration ──────────────────────────────────
# Handles: HTTP→HTTPS redirect, SSL termination, reverse proxy, security headers.
# Replace YOURDOMAIN.COM with the real domain (same value as $DOMAIN env var).

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" rt=$request_time';
    access_log  /var/log/nginx/access.log  main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    gzip  on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/xml+rss application/atom+xml
               image/svg+xml;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    # auth endpoints: 10 req/min per IP
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    # generate endpoint: 5 req/min per IP
    limit_req_zone $binary_remote_addr zone=gen_limit:10m  rate=5r/m;
    # search endpoint: 60 req/min per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=60r/m;

    # ── Upstream services ─────────────────────────────────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    upstream frontend {
        server frontend:80;
        keepalive 16;
    }

    # ── HTTP → HTTPS redirect + Let's Encrypt ACME challenge ─────────────────
    server {
        listen 80;
        server_name _;

        # Let's Encrypt ACME challenge (used by certbot)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Health check for nginx itself (used by docker-compose healthcheck)
        location /health-nginx {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS main server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name YOURDOMAIN.COM;

        # ── SSL ───────────────────────────────────────────────────────────────
        ssl_certificate     /etc/letsencrypt/live/YOURDOMAIN.COM/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/YOURDOMAIN.COM/privkey.pem;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # ── Security headers ──────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options           "SAMEORIGIN"                          always;
        add_header X-Content-Type-Options    "nosniff"                             always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
        add_header Permissions-Policy        "geolocation=(), microphone=()"       always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:;"
            always;

        # ── Request size limit ────────────────────────────────────────────────
        client_max_body_size 10m;

        # ── API endpoints → backend ───────────────────────────────────────────
        location /api/ {
            # Strip /api prefix before proxying
            rewrite ^/api(/.*)$ $1 break;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;  # generation can take ~60s
            proxy_send_timeout 30s;

            # Per-route rate limiting
            location /api/auth/ {
                rewrite ^/api(/.*)$ $1 break;
                limit_req zone=auth_limit burst=5 nodelay;
                proxy_pass http://backend;
            }
            location /api/generations/ {
                rewrite ^/api(/.*)$ $1 break;
                limit_req zone=gen_limit burst=3 nodelay;
                proxy_pass http://backend;
            }
            location /api/search/ {
                rewrite ^/api(/.*)$ $1 break;
                limit_req zone=api_limit burst=20 nodelay;
                proxy_pass http://backend;
            }
        }

        # ── Health + metrics (direct backend, no auth needed) ─────────────────
        location ~ ^/(health|metrics)$ {
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            access_log off;
        }

        # ── React SPA → frontend ──────────────────────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Cache static assets aggressively
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
                proxy_pass http://frontend;
                expires    1y;
                add_header Cache-Control "public, immutable";
            }
        }
    }
}
