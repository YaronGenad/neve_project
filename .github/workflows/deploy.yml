name: CI / CD — Al-Hasade Production Deploy

# Triggers on every push to main branch
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository }}/backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository }}/frontend

jobs:
  # ── Job 1: Run test suite ──────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: test_alhasade
          POSTGRES_USER: alhasade
          POSTGRES_PASSWORD: alhasade
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov

      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://alhasade:alhasade@localhost:5432/test_alhasade
          SECRET_KEY: test-secret-key
          GEMINI_API_KEY: test-key
        run: alembic upgrade head

      - name: Run auth tests
        working-directory: backend
        env:
          DATABASE_URL: sqlite:///./test_alhasade_ci.db
          SECRET_KEY: test-secret-key
          GEMINI_API_KEY: test-key
          NVIDIA_API_KEY: test-key
          AUTH_RATE_LIMIT: "1000/minute"
          GENERATION_RATE_LIMIT: "1000/minute"
        run: pytest test_auth_complete.py -v

      - name: Run cache/search tests
        working-directory: backend
        env:
          DATABASE_URL: sqlite:///./test_alhasade_ci.db
          SECRET_KEY: test-secret-key
          GEMINI_API_KEY: test-key
          NVIDIA_API_KEY: test-key
          AUTH_RATE_LIMIT: "1000/minute"
          GENERATION_RATE_LIMIT: "1000/minute"
        run: pytest test_cache_search.py -v

      - name: Run generation tests
        working-directory: backend
        env:
          DATABASE_URL: sqlite:///./test_alhasade_ci.db
          SECRET_KEY: test-secret-key
          GEMINI_API_KEY: test-key
          NVIDIA_API_KEY: test-key
          AUTH_RATE_LIMIT: "1000/minute"
          GENERATION_RATE_LIMIT: "1000/minute"
        run: pytest test_generations_complete.py -v

      - name: Run approval loop tests
        working-directory: backend
        env:
          DATABASE_URL: sqlite:///./test_alhasade_ci.db
          SECRET_KEY: test-secret-key
          GEMINI_API_KEY: test-key
          NVIDIA_API_KEY: test-key
          AUTH_RATE_LIMIT: "1000/minute"
          GENERATION_RATE_LIMIT: "1000/minute"
        run: pytest test_approval_loop.py -v

      - name: Run security tests
        working-directory: backend
        env:
          DATABASE_URL: sqlite:///./test_alhasade_ci.db
          SECRET_KEY: test-secret-key
          GEMINI_API_KEY: test-key
          NVIDIA_API_KEY: test-key
          AUTH_RATE_LIMIT: "1000/minute"
          GENERATION_RATE_LIMIT: "1000/minute"
        run: pytest test_security.py -v

  # ── Job 2: Build and push Docker images ───────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    # Only build+push on main branch (not PRs)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=https://${{ secrets.DOMAIN }}/api

  # ── Job 3: Deploy to LightSail ─────────────────────────────────────────────
  deploy:
    name: Deploy to LightSail
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: https://${{ secrets.DOMAIN }}

    steps:
      - uses: actions/checkout@v4

      - name: Copy compose files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml,nginx.conf"
          target: "~/alhasade"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/alhasade

            # Log in to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest images
            docker compose -f docker-compose.prod.yml --env-file .env.prod pull

            # Deploy with zero-downtime rolling restart
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --remove-orphans

            # Run DB migrations
            docker compose -f docker-compose.prod.yml --env-file .env.prod \
              exec -T backend alembic upgrade head

            # Verify health
            sleep 10
            curl -sf https://${{ secrets.DOMAIN }}/health | grep -q healthy
            echo "Deploy successful!"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment to production FAILED. Check logs above."
          # Add Slack/email notification here if needed
