version: "3.9"

# ── Monitoring Stack — Prometheus + Grafana ────────────────────────────────────
# Add-on to the production compose file.  Run alongside the main stack:
#
#   docker compose \
#     -f docker-compose.prod.yml \
#     -f docker-compose.monitoring.yml \
#     --env-file .env.prod up -d
#
# Grafana UI: http://localhost:3001  (or https://DOMAIN/grafana via nginx)
# Prometheus UI: http://localhost:9090

services:

  prometheus:
    image: prom/prometheus:v2.49.1
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.console.libraries=/etc/prometheus/console_libraries
      - --web.console.templates=/etc/prometheus/consoles
      - --web.enable-lifecycle
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana:10.2.3
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "https://${DOMAIN:-localhost}/grafana"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis exporter — exposes Redis metrics to Prometheus
  redis-exporter:
    image: oliver006/redis_exporter:v1.55.0
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
    expose:
      - "9121"

volumes:
  prometheus_data:
  grafana_data:
